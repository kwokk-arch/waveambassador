<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Sea Ambassador – Wave + 3D Sea Wave Background</title>
    <style>
        * { margin: 0; padding: 0; }
        body { overflow: hidden; background: #0a1128; font-family: 'Segoe UI', sans-serif; }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
        }

        #hud {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 20;
            flex-wrap: wrap;
            gap: 10px;
        }
        .hud-item {
            background: rgba(10, 17, 40, 0.8);
            border: 1px solid #0055aa;
            padding: 8px 18px;
            border-radius: 10px;
            backdrop-filter: blur(4px);
            display: flex;
            flex-direction: column;
        }
        .hud-item .label { font-size: 0.6rem; text-transform: uppercase; color: #b0c4de; letter-spacing: 1px; }
        .hud-item .value { font-size: 1.2rem; font-weight: 700; }
        .orange { color: #fe5722; }
        .green { color: #44ff88; }
        .blue { color: #4499ff; }

        #bottom-info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 30;
            pointer-events: none;
            background: rgba(10, 17, 40, 0.8);
            border: 1px solid #0055aa;
            padding: 12px 18px;
            border-radius: 10px;
            backdrop-filter: blur(4px);
            max-width: 340px;
        }
        #bottom-info .title { font-size: 0.7rem; color: #4499ff; text-transform: uppercase; letter-spacing: 1px; }
        #bottom-info .desc { font-size: 0.8rem; color: #b0c4de; line-height: 1.4; }
        #bottom-info .gesture-list { font-size: 0.7rem; color: #b0c4de; padding-left: 12px; margin-top: 4px; }
        #bottom-info .gesture-list li { list-style: none; }
        #bottom-info .gesture-list li::before { content: "• "; color: #fe5722; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <div id="hud">
        <div class="hud-item"><span class="label">Ambassador</span><span class="value orange">&#9973; Sailor</span></div>
        <div class="hud-item"><span class="label">Status</span><span id="hud-status" class="value green">&#9679; Ready</span></div>
        <div class="hud-item"><span class="label">Total Participation</span><span id="hud-count" class="value blue">0</span></div>
    </div>

    <div id="bottom-info">
        <div class="title">&#129302; Ambassador Ready</div>
        <div class="desc">Wave your physical hand or move your mouse to deform the silk threads and interact with the avatar!</div>
        <ul class="gesture-list">
            <li><strong>We Adapt</strong> — Wave your hand across your webcam</li>
        </ul>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://esm.sh/three@0.160.0",
            "three/addons/": "https://esm.sh/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script>
        window.shaderInputState = {
            targetX: 0.5,
            targetY: 0.5,
            isUsingCamera: false
        };
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        const container = document.getElementById('canvas-container');
        const hudStatus = document.getElementById('hud-status');
        const hudCount = document.getElementById('hud-count');

        let activationCount = 0;
        let isSaluting = false;
        let isProcessing = false;

        // ================================================================
        // SINGLE WebGL Renderer — fixes avatar disappearing (context loss)
        // ================================================================
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.autoClear = false;
        container.appendChild(renderer.domElement);

        // Safety: handle context loss gracefully
        let contextLost = false;
        renderer.domElement.addEventListener('webglcontextlost', (e) => {
            e.preventDefault();
            contextLost = true;
            console.warn('WebGL context lost — waiting for restore...');
        });
        renderer.domElement.addEventListener('webglcontextrestored', () => {
            contextLost = false;
            console.log('WebGL context restored');
            resize();
        });

        // Detect WebGL version for shader compatibility
        const isWebGL2 = renderer.capabilities.isWebGL2;

        // ================================================================
        // Background Silk Threads — using RawShaderMaterial
        // RawShaderMaterial bypasses Three.js shader preprocessing entirely,
        // preventing the GLSL conversion bugs that caused context loss.
        // ================================================================
        const bgScene = new THREE.Scene();
        const bgCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

        // ---- GLSL 300 es shaders (WebGL2) ----
        const silkVertexShader300 = `#version 300 es
in vec3 position;
void main() {
    gl_Position = vec4(position.xy, 0.0, 1.0);
}`;

        const silkFragmentShader300 = `#version 300 es
precision highp float;

uniform float iTime;
uniform vec3 iResolution;
uniform vec3 uColor;
uniform float uAmplitude;
uniform float uDistance;
uniform vec2 uMouse;

out vec4 outColor;

#define PI 3.1415926538
const int u_line_count = 40;
const float u_line_width = 7.0;
const float u_line_blur = 10.0;

float Perlin2D(vec2 P) {
    vec2 Pi = floor(P);
    vec4 Pf_Pfmin1 = P.xyxy - vec4(Pi, Pi + 1.0);
    vec4 Pt = vec4(Pi.xy, Pi.xy + 1.0);
    Pt = Pt - floor(Pt * (1.0 / 71.0)) * 71.0;
    Pt += vec2(26.0, 161.0).xyxy;
    Pt *= Pt;
    Pt = Pt.xzxz * Pt.yyww;
    vec4 hash_x = fract(Pt * (1.0 / 951.135664));
    vec4 hash_y = fract(Pt * (1.0 / 642.949883));
    vec4 grad_x = hash_x - 0.49999;
    vec4 grad_y = hash_y - 0.49999;
    vec4 grad_results = inversesqrt(grad_x * grad_x + grad_y * grad_y)
        * (grad_x * Pf_Pfmin1.xzxz + grad_y * Pf_Pfmin1.yyww);
    grad_results *= 1.4142135623730950;
    vec2 blend = Pf_Pfmin1.xy * Pf_Pfmin1.xy * Pf_Pfmin1.xy
        * (Pf_Pfmin1.xy * (Pf_Pfmin1.xy * 6.0 - 15.0) + 10.0);
    vec4 blend2 = vec4(blend, vec2(1.0 - blend));
    return dot(grad_results, blend2.zxzx * blend2.wwyy);
}

float pixelSize(float count, vec2 resolution) {
    return (1.0 / max(resolution.x, resolution.y)) * count;
}

float lineFn(vec2 st, float width, float perc, float offset, vec2 mouse, float time, float amplitude, float dist) {
    float split_offset = (perc * 0.4);
    float split_point = 0.1 + split_offset;
    float amplitude_normal = smoothstep(split_point, 0.7, st.x);
    float amplitude_strength = 0.5;
    float finalAmplitude = amplitude_normal * amplitude_strength * amplitude * (1.0 + (mouse.y - 0.5) * 0.2);
    float time_scaled = time / 10.0 + (mouse.x - 0.5) * 1.0;
    float blur = smoothstep(split_point, split_point + 0.05, st.x) * perc;

    float xnoise = mix(
        Perlin2D(vec2(time_scaled, st.x + perc) * 2.5),
        Perlin2D(vec2(time_scaled, st.x + time_scaled) * 3.5) / 1.5,
        st.x * 0.3
    );

    float y = 0.5 + (perc - 0.5) * dist + xnoise / 2.0 * finalAmplitude;
    float line_start = smoothstep(y + (width / 2.0) + (u_line_blur * pixelSize(1.0, iResolution.xy) * blur), y, st.y);
    float line_end = smoothstep(y, y - (width / 2.0) - (u_line_blur * pixelSize(1.0, iResolution.xy) * blur), st.y);

    return clamp((line_start - line_end) * (1.0 - smoothstep(0.0, 1.0, pow(perc, 0.3))), 0.0, 1.0);
}

void main() {
    vec2 uv = gl_FragCoord.xy / iResolution.xy;
    float line_strength = 1.0;
    for (int i = 0; i < u_line_count; i++) {
        float p = float(i) / float(u_line_count);
        line_strength *= (1.0 - lineFn(uv, u_line_width * pixelSize(1.0, iResolution.xy) * (1.0 - p), p, (PI * 1.0) * p, uMouse, iTime, uAmplitude, uDistance));
    }
    float colorVal = 1.0 - line_strength;
    vec3 customBgColor = vec3(0.039, 0.067, 0.157);
    outColor = vec4(mix(customBgColor, uColor, colorVal), 1.0);
}`;

        // ---- GLSL 100 fallback shaders (WebGL1) ----
        const silkVertexShader100 = `
precision highp float;
attribute vec3 position;
void main() {
    gl_Position = vec4(position.xy, 0.0, 1.0);
}`;

        const silkFragmentShader100 = `
precision highp float;

uniform float iTime;
uniform vec3 iResolution;
uniform vec3 uColor;
uniform float uAmplitude;
uniform float uDistance;
uniform vec2 uMouse;

#define PI 3.1415926538
const int u_line_count = 40;
const float u_line_width = 7.0;
const float u_line_blur = 10.0;

float Perlin2D(vec2 P) {
    vec2 Pi = floor(P);
    vec4 Pf_Pfmin1 = P.xyxy - vec4(Pi, Pi + 1.0);
    vec4 Pt = vec4(Pi.xy, Pi.xy + 1.0);
    Pt = Pt - floor(Pt * (1.0 / 71.0)) * 71.0;
    Pt += vec2(26.0, 161.0).xyxy;
    Pt *= Pt;
    Pt = Pt.xzxz * Pt.yyww;
    vec4 hash_x = fract(Pt * (1.0 / 951.135664));
    vec4 hash_y = fract(Pt * (1.0 / 642.949883));
    vec4 grad_x = hash_x - 0.49999;
    vec4 grad_y = hash_y - 0.49999;
    vec4 grad_results = inversesqrt(grad_x * grad_x + grad_y * grad_y)
        * (grad_x * Pf_Pfmin1.xzxz + grad_y * Pf_Pfmin1.yyww);
    grad_results *= 1.4142135623730950;
    vec2 blend = Pf_Pfmin1.xy * Pf_Pfmin1.xy * Pf_Pfmin1.xy
        * (Pf_Pfmin1.xy * (Pf_Pfmin1.xy * 6.0 - 15.0) + 10.0);
    vec4 blend2 = vec4(blend, vec2(1.0 - blend));
    return dot(grad_results, blend2.zxzx * blend2.wwyy);
}

float pixelSize(float count, vec2 resolution) {
    return (1.0 / max(resolution.x, resolution.y)) * count;
}

float lineFn(vec2 st, float width, float perc, float offset, vec2 mouse, float time, float amplitude, float dist) {
    float split_offset = (perc * 0.4);
    float split_point = 0.1 + split_offset;
    float amplitude_normal = smoothstep(split_point, 0.7, st.x);
    float amplitude_strength = 0.5;
    float finalAmplitude = amplitude_normal * amplitude_strength * amplitude * (1.0 + (mouse.y - 0.5) * 0.2);
    float time_scaled = time / 10.0 + (mouse.x - 0.5) * 1.0;
    float blur = smoothstep(split_point, split_point + 0.05, st.x) * perc;

    float xnoise = mix(
        Perlin2D(vec2(time_scaled, st.x + perc) * 2.5),
        Perlin2D(vec2(time_scaled, st.x + time_scaled) * 3.5) / 1.5,
        st.x * 0.3
    );

    float y = 0.5 + (perc - 0.5) * dist + xnoise / 2.0 * finalAmplitude;
    float line_start = smoothstep(y + (width / 2.0) + (u_line_blur * pixelSize(1.0, iResolution.xy) * blur), y, st.y);
    float line_end = smoothstep(y, y - (width / 2.0) - (u_line_blur * pixelSize(1.0, iResolution.xy) * blur), st.y);

    return clamp((line_start - line_end) * (1.0 - smoothstep(0.0, 1.0, pow(perc, 0.3))), 0.0, 1.0);
}

void main() {
    vec2 uv = gl_FragCoord.xy / iResolution.xy;
    float line_strength = 1.0;
    for (int i = 0; i < u_line_count; i++) {
        float p = float(i) / float(u_line_count);
        line_strength *= (1.0 - lineFn(uv, u_line_width * pixelSize(1.0, iResolution.xy) * (1.0 - p), p, (PI * 1.0) * p, uMouse, iTime, uAmplitude, uDistance));
    }
    float colorVal = 1.0 - line_strength;
    vec3 customBgColor = vec3(0.039, 0.067, 0.157);
    gl_FragColor = vec4(mix(customBgColor, uColor, colorVal), 1.0);
}`;

        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        const silkUniforms = {
            iTime:       { value: 0 },
            iResolution: { value: new THREE.Vector3(window.innerWidth * dpr, window.innerHeight * dpr, window.innerWidth / window.innerHeight) },
            uColor:      { value: new THREE.Color(0.3, 0.6, 1.0) },
            uAmplitude:  { value: 1.4 },
            uDistance:    { value: 0.3 },
            uMouse:      { value: new THREE.Vector2(0.5, 0.5) }
        };

        // Use RawShaderMaterial — bypasses Three.js's GLSL auto-conversion
        // that was mangling the shader and causing "program not valid" errors.
        // NOTE: Do NOT set glslVersion here — our shaders already include
        // #version 300 es. Setting glslVersion: THREE.GLSL3 would cause
        // Three.js to prepend a DUPLICATE #version, which is a fatal error.
        const bgMaterial = new THREE.RawShaderMaterial({
            vertexShader:   isWebGL2 ? silkVertexShader300 : silkVertexShader100,
            fragmentShader: isWebGL2 ? silkFragmentShader300 : silkFragmentShader100,
            uniforms: silkUniforms,
            depthWrite: false,
            depthTest: false
        });

        bgScene.add(new THREE.Mesh(new THREE.PlaneGeometry(2, 2), bgMaterial));

        // ================================================================
        // Main 3D Scene (avatar, wave bands, info square)
        // ================================================================
        const scene = new THREE.Scene();

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0.0, 1.4, 3.2);
        camera.lookAt(0, 1.1, 0);

        // ================================================================
        // 3D Sea Wave Background Bands
        // ================================================================
        const waveGroup = new THREE.Group();
        scene.add(waveGroup);

        const seaColors = ['#ff3333', '#fe5722', '#00aa55', '#00cccc', '#4499ff', '#000084'];
        const bandCount = 6;
        const totalHeight = 1.2;
        const bandHeight = totalHeight / bandCount;

        for (let i = 0; i < bandCount; i++) {
            const yOffset = -0.4 + i * bandHeight;
            const color = new THREE.Color(seaColors[i % seaColors.length]);
            const segments = 40;
            const geometry = new THREE.BufferGeometry();
            const positions = [];
            const uvs = [];

            for (let j = 0; j <= segments; j++) {
                const t = j / segments;
                const x = -3.5 + t * 7.0;
                const waveOffset = Math.sin(t * Math.PI * 3 + i * 0.8) * 0.15 * (1 - i / bandCount * 0.5);
                const y = yOffset + waveOffset;

                positions.push(x, y, -2.0);
                positions.push(x, y + bandHeight * 0.85, -2.0);
                uvs.push(t, 0);
                uvs.push(t, 1);
            }

            const indices = [];
            for (let j = 0; j < segments; j++) {
                const a = j * 2;
                const b = j * 2 + 1;
                const c = (j + 1) * 2;
                const d = (j + 1) * 2 + 1;
                indices.push(a, b, c);
                indices.push(b, d, c);
            }

            geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            geometry.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
            geometry.setIndex(indices);
            geometry.computeVertexNormals();

            const material = new THREE.MeshBasicMaterial({
                color: color,
                transparent: true,
                opacity: 0.75 - i * 0.05,
                side: THREE.DoubleSide
            });

            waveGroup.add(new THREE.Mesh(geometry, material));
        }

        const ringGeo = new THREE.RingGeometry(1.1, 1.15, 48);
        const ringMat = new THREE.MeshBasicMaterial({
            color: 0x4499ff,
            transparent: true,
            opacity: 0.3,
            side: THREE.DoubleSide
        });
        const ring = new THREE.Mesh(ringGeo, ringMat);
        ring.position.set(0, 1.1, -2.1);
        waveGroup.add(ring);

        // ================================================================
        // Lighting
        // ================================================================
        scene.add(new THREE.AmbientLight(0xffffff, 1.2));
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight.position.set(2, 4, 3);
        scene.add(dirLight);

        // ================================================================
        // Avatar Loader
        // ================================================================
        const avatar = new THREE.Group();
        scene.add(avatar);

        let rightArmBone = null;

        const fallbackMesh = new THREE.Mesh(
            new THREE.CylinderGeometry(0.2, 0.3, 1.4, 16),
            new THREE.MeshBasicMaterial({ color: 0x00aa55, wireframe: true })
        );
        fallbackMesh.position.y = 0.7;
        avatar.add(fallbackMesh);

        const gltfLoader = new GLTFLoader();
        gltfLoader.load('./assets/ready_player_me_female_avatar__vrchatgame.glb', (gltf) => {
            avatar.remove(fallbackMesh);

            const model = gltf.scene;
            model.scale.set(0.95, 0.95, 0.95);
            model.position.set(0, 0, 0);

            model.traverse((child) => {
                child.visible = true;

                if (child.isMesh || child.isSkinnedMesh) {
                    child.frustumCulled = false;

                    if (child.material) {
                        child.material.visible = true;
                        child.material.opacity = 1.0;
                        child.material.transparent = false;
                        child.material.side = THREE.DoubleSide;

                        if (child.material.map) {
                            const tex = child.material.map;
                            child.material = new THREE.MeshBasicMaterial({
                                map: tex,
                                side: THREE.DoubleSide,
                                transparent: false,
                                opacity: 1.0
                            });
                        } else {
                            child.material = new THREE.MeshBasicMaterial({
                                color: 0xdddddd,
                                side: THREE.DoubleSide
                            });
                        }
                        child.material.needsUpdate = true;
                    }
                }
                if (child.isBone && (child.name.includes('RightArm') || child.name.includes('mixamorigRightArm'))) {
                    rightArmBone = child;
                }
            });

            avatar.add(model);
        }, undefined, (error) => {
            console.error('GLTF load error:', error);
        });

        // ================================================================
        // Rotating Info Square
        // ================================================================
        const squareCanvas = document.createElement('canvas');
        squareCanvas.width = 512;
        squareCanvas.height = 512;
        const sqCtx = squareCanvas.getContext('2d');

        function updateSquareText(text) {
            sqCtx.clearRect(0, 0, 512, 512);
            const grad = sqCtx.createRadialGradient(256, 256, 50, 256, 256, 280);
            grad.addColorStop(0, '#003366');
            grad.addColorStop(0.5, '#002244');
            grad.addColorStop(1, '#0a1128');
            sqCtx.fillStyle = grad;
            sqCtx.fillRect(0, 0, 512, 512);
            sqCtx.strokeStyle = '#fe5722';
            sqCtx.lineWidth = 6;
            sqCtx.strokeRect(20, 20, 472, 472);
            sqCtx.textAlign = 'center';
            sqCtx.textBaseline = 'middle';

            const lines = text.split(' \u2014 ');
            if (lines.length > 1) {
                sqCtx.font = 'Bold 44px "Segoe UI", sans-serif';
                sqCtx.fillStyle = '#ffffff';
                sqCtx.fillText(lines[0], 256, 200);
                sqCtx.font = '32px "Segoe UI", sans-serif';
                sqCtx.fillStyle = '#4499ff';
                sqCtx.fillText(lines[1], 256, 310);
            } else {
                sqCtx.font = 'Bold 52px "Segoe UI", sans-serif';
                sqCtx.fillStyle = '#ffffff';
                sqCtx.fillText(text, 256, 256);
            }
            squareTexture.needsUpdate = true;
        }

        const squareTexture = new THREE.CanvasTexture(squareCanvas);
        const squareMat = new THREE.MeshBasicMaterial({
            map: squareTexture,
            side: THREE.DoubleSide
        });
        const square = new THREE.Mesh(new THREE.BoxGeometry(0.45, 0.45, 0.02), squareMat);
        square.position.set(0, 1.85, 0.3);
        avatar.add(square);
        updateSquareText('\ud83e\udd16 Sailor Ambassador');

        // ================================================================
        // Salute State
        // ================================================================
        let targetArmZ = 0.0;
        let targetArmX = 0.0;

        function performActivation() {
            if (isSaluting || isProcessing) return;
            isSaluting = true;
            isProcessing = true;

            activationCount++;
            hudCount.textContent = activationCount;
            hudStatus.textContent = '\u25cf Activated!';
            hudStatus.className = 'value orange';

            const responses = ['We Adapt', 'We Serve', 'We Run', 'We Commit', 'We Humble'];
            const randomResponse = responses[Math.floor(Math.random() * responses.length)];
            updateSquareText('\ud83c\udf0a ' + randomResponse);

            targetArmZ = -1.1;
            targetArmX = -0.9;

            setTimeout(() => {
                targetArmZ = 0.0;
                targetArmX = 0.0;
                setTimeout(() => {
                    isSaluting = false;
                    isProcessing = false;
                    hudStatus.textContent = '\u25cf Ready';
                    hudStatus.className = 'value green';
                    setTimeout(() => updateSquareText('\ud83e\udd16 Sailor Ambassador'), 2000);
                }, 400);
            }, 1800);
        }

        // ================================================================
        // Camera Wave Detection
        // ================================================================
        let lastActivationTime = 0;

        async function setupWaveDetection() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const video = document.createElement('video');
                video.srcObject = stream;
                video.play();
                await new Promise(resolve => video.onloadedmetadata = resolve);

                hudStatus.textContent = '\u25cf Camera On';
                hudStatus.className = 'value green';

                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d', { willReadFrequently: true });

                function detect() {
                    if (video.readyState >= video.HAVE_ENOUGH_DATA) {
                        canvas.width = 320;
                        canvas.height = 240;
                        ctx.translate(canvas.width, 0);
                        ctx.scale(-1, 1);
                        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                        ctx.setTransform(1, 0, 0, 1, 0, 0);

                        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                        const data = imageData.data;

                        let matchCount = 0;
                        for (let i = 0; i < data.length; i += 4) {
                            const r = data[i], g = data[i+1], b = data[i+2];
                            if (r > 75 && g > 40 && b > 20 && r > g && (r - Math.min(g, b) > 15)) {
                                matchCount++;
                            }
                        }

                        if (matchCount > (canvas.width * canvas.height * 0.04)) {
                            const now = Date.now();
                            if (now - lastActivationTime > 3000 && !isProcessing) {
                                lastActivationTime = now;
                                performActivation();
                            }
                        }
                    }
                    requestAnimationFrame(detect);
                }
                detect();
            } catch (e) {
                hudStatus.textContent = '\u25cf Camera Off';
                hudStatus.className = 'value red';
            }
        }
        setupWaveDetection();

        // ================================================================
        // Mouse Input
        // ================================================================
        let currentMouse = [0.5, 0.5];

        window.addEventListener('mousemove', (e) => {
            window.shaderInputState.isUsingCamera = false;
            window.shaderInputState.targetX = e.clientX / window.innerWidth;
            window.shaderInputState.targetY = 1.0 - e.clientY / window.innerHeight;
        });

        window.addEventListener('mouseleave', () => {
            if (!window.shaderInputState.isUsingCamera) {
                window.shaderInputState.targetX = 0.5;
                window.shaderInputState.targetY = 0.5;
            }
        });

        // Click on canvas triggers activation
        renderer.domElement.addEventListener('click', () => {
            performActivation();
        });

        // ================================================================
        // Resize Handler
        // ================================================================
        function resize() {
            const width = window.innerWidth;
            const height = window.innerHeight;
            const currentDpr = Math.min(window.devicePixelRatio || 1, 2);

            renderer.setSize(width, height);
            renderer.setPixelRatio(currentDpr);

            silkUniforms.iResolution.value.set(
                width * currentDpr,
                height * currentDpr,
                width / height
            );

            camera.aspect = width / height;
            camera.updateProjectionMatrix();
        }
        window.addEventListener('resize', resize);

        // ================================================================
        // Unified Animation Loop
        // ================================================================
        let time = 0;

        function animate(timestamp) {
            requestAnimationFrame(animate);

            // Skip rendering if context is lost
            if (contextLost) return;

            time += 0.016;

            // Smooth mouse interpolation
            currentMouse[0] += 0.05 * (window.shaderInputState.targetX - currentMouse[0]);
            currentMouse[1] += 0.05 * (window.shaderInputState.targetY - currentMouse[1]);

            // Update silk thread uniforms
            silkUniforms.uMouse.value.set(currentMouse[0], currentMouse[1]);
            silkUniforms.iTime.value = (timestamp || 0) * 0.001;

            // Rotate info square
            square.rotation.y = time * 0.8;
            square.rotation.x = Math.sin(time * 0.7) * 0.25;

            // Animate wave bands
            waveGroup.children.forEach((child, index) => {
                if (child.geometry && child !== ring) {
                    const offset = index * 0.3;
                    child.position.z = Math.sin(time * 0.5 + offset) * 0.04;
                }
            });

            // Animate arm bone
            if (rightArmBone) {
                const speed = 8 * 0.016;
                rightArmBone.rotation.z += (targetArmZ - rightArmBone.rotation.z) * speed;
                rightArmBone.rotation.x += (targetArmX - rightArmBone.rotation.x) * speed;
            }

            // Gentle avatar bob
            avatar.position.y = Math.sin(time * 1.8) * 0.008;

            // ── Render: two passes, ONE context ──
            renderer.clear(true, true, true);
            renderer.render(bgScene, bgCamera);
            renderer.clearDepth();
            renderer.render(scene, camera);
        }
        requestAnimationFrame(animate);
    </script>
</body>
</html>
